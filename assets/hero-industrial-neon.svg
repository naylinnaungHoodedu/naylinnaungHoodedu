<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nay Linn Aung executive industrial AI profile banner</title>
  <desc id="desc">Executive industrial banner for Nay Linn Aung highlighting PLC and SCADA systems, machine vision, explainable AI, full-stack delivery, and core proof points from production engineering work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111C"/>
      <stop offset="0.52" stop-color="#0C1A2C"/>
      <stop offset="1" stop-color="#0A1526"/>
    </linearGradient>
    <radialGradient id="steelGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 82) rotate(19.9) scale(462 208)">
      <stop offset="0" stop-color="#123E63" stop-opacity="0.46"/>
      <stop offset="0.58" stop-color="#123E63" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#123E63" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="264" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1A2C"/>
      <stop offset="1" stop-color="#091423"/>
    </linearGradient>
    <linearGradient id="panelRight" x1="0" y1="0" x2="0" y2="264" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F1A2D"/>
      <stop offset="1" stop-color="#0A1422"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="84" y1="0" x2="790" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08CFFF"/>
      <stop offset="1" stop-color="#6EAFFF"/>
    </linearGradient>
    <pattern id="blueprint" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" stroke="#234769" stroke-width="1"/>
      <path d="M32 0V64M0 32H64" stroke="#17314A" stroke-width="1"/>
    </pattern>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#02070E" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="24" fill="url(#steelGlow)"/>
  <rect width="1280" height="320" rx="24" fill="url(#blueprint)" opacity="0.22"/>
  <rect x="1" y="1" width="1278" height="318" rx="23" stroke="#1A3048" stroke-width="2"/>

  <rect x="28" y="28" width="824" height="264" rx="18" fill="url(#panel)" stroke="#22405D"/>
  <rect x="864" y="28" width="388" height="264" rx="18" fill="url(#panelRight)" stroke="#203A56"/>

  <path d="M84 76H148" stroke="url(#cyanLine)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="72" cy="76" r="5" fill="#08CFFF"/>
  <text x="162" y="82" fill="#7EEAFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="4">INDUSTRIAL AI / ROBOTICS</text>

  <path d="M84 244H778" stroke="#1A3148" stroke-width="2"/>
  <path d="M84 122H790" stroke="#10263C" stroke-width="1"/>

  <text x="84" y="156" fill="#F6FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="700" letter-spacing="1.2">NAY LINN AUNG</text>
  <text x="86" y="198" fill="#B9D7FF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="600">PLC/SCADA | Machine Vision | Explainable AI | Full-Stack Delivery</text>
  <text x="86" y="238" fill="#EDF5FF" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="600">OT-to-IT systems builder for production automation, applied ML, and deployable software.</text>

  <rect x="86" y="256" width="178" height="24" rx="12" fill="#131F2F" stroke="#6D5221"/>
  <text x="104" y="272" fill="#FFD28A" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.4">M.S. CS @ HOOD</text>

  <g filter="url(#cardShadow)">
    <rect x="896" y="52" width="324" height="62" rx="16" fill="#101E31" stroke="#245882"/>
    <rect x="896" y="52" width="6" height="62" rx="3" fill="#08CFFF"/>
    <text x="922" y="76" fill="#7EEAFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2.2">EXPERIENCE</text>
    <text x="922" y="99" fill="#F6FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">12+ Years</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="896" y="129" width="324" height="62" rx="16" fill="#101E31" stroke="#245882"/>
    <rect x="896" y="129" width="6" height="62" rx="3" fill="#08CFFF"/>
    <text x="922" y="153" fill="#7EEAFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">NATIONAL GRID SCADA</text>
    <text x="922" y="176" fill="#F6FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">100+ RTU Sites</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="896" y="206" width="324" height="62" rx="16" fill="#111D2E" stroke="#6E5322"/>
    <rect x="896" y="206" width="6" height="62" rx="3" fill="#FFB347"/>
    <text x="922" y="230" fill="#FFD28A" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">ROBOTICS DELIVERY</text>
    <text x="922" y="253" fill="#FFF7EC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">20+ Cobot Machines</text>
  </g>
</svg>
